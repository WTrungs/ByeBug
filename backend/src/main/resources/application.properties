spring.application.name=byebug
server.port=${SPRING_PORT}
spring.output.ansi.enabled=always

spring.config.import=optional:file:../.env[.properties]
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL}}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

app.jwt.secret=${JWT_SECRET:byebug-dev-secret-change-this-before-production-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

storage.endpoint=${STORAGE_ENDPOINT:}
storage.bucket=${STORAGE_BUCKET:}
storage.access-key=${STORAGE_ACCESS_KEY:}
storage.secret-key=${STORAGE_SECRET_KEY:}
storage.region=${STORAGE_REGION:us-east-005}
